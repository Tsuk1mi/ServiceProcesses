version: "3.9"

# Стек: API, SLA-воркер, воркер очереди (RabbitMQ), Postgres, Redis, RabbitMQ.
# Запуск из каталога infra/docker: docker compose up -d --build

services:
  postgres:
    image: postgres:16-alpine
    container_name: service-processes-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: service_processes
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: service-processes-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: service-processes-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: service-processes-backend
    ports:
      - "8080:8080"
    environment:
      APP_MODE: api
      JWT_SECRET: change-me-in-production
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JOB_QUEUE_NAME: service_jobs
      DATABASE_URL: postgres://app:app@postgres:5432/service_processes
      RUST_LOG: info,tower_http=debug
    depends_on:
      - postgres
      - redis
      - rabbitmq

  sla-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: service-processes-sla-worker
    environment:
      APP_MODE: worker
      WORKER_INTERVAL_SEC: "30"
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      DATABASE_URL: postgres://app:app@postgres:5432/service_processes
      RUST_LOG: info
    depends_on:
      - postgres
      - redis
      - rabbitmq

  queue-worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: service-processes-queue-worker
    environment:
      APP_MODE: queue_worker
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      JOB_QUEUE_NAME: service_jobs
      RUST_LOG: info
    depends_on:
      - redis
      - rabbitmq

  minio:
    image: minio/minio:latest
    container_name: service-processes-minio
    profiles:
      - extras
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  nexus:
    image: sonatype/nexus3:3.70.1
    container_name: service-processes-nexus
    profiles:
      - extras
    ports:
      - "8081:8081"

volumes:
  pgdata:
