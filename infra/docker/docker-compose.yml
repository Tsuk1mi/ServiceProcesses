version: "3.9"

services:
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: service-processes-backend
    ports:
      - "8080:8080"
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: service-processes
      NEXUS_URL: http://nexus:8081
    depends_on:
      - rabbitmq
      - minio
      - nexus

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: service-processes-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    container_name: service-processes-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"

  nexus:
    image: sonatype/nexus3:3.70.1
    container_name: service-processes-nexus
    ports:
      - "8081:8081"
