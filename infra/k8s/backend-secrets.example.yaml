# Пример Secret для локального/демо Kubernetes (без External Secrets).
# Применение: kubectl apply -f infra/k8s/backend-secrets.example.yaml
# Убедитесь, что не конфликтует с ExternalSecret backend-secrets (удалите один из вариантов).
apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: service-processes
type: Opaque
stringData:
  DATABASE_URL: postgres://app:app@postgres:5432/service_processes
  JWT_SECRET: change-me-in-production
