apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-worker
  namespace: service-processes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-worker
  template:
    metadata:
      labels:
        app: queue-worker
    spec:
      containers:
        - name: queue-worker
          image: nexus.example.local/repository/service-processes/backend:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_MODE
              value: queue_worker
            - name: JOB_QUEUE_NAME
              value: service_jobs
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secrets
