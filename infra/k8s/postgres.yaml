# Демо Postgres для namespace service-processes. В проде замените на управляемую БД и DATABASE_URL в Secret.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: service-processes
type: Opaque
stringData:
  POSTGRES_USER: app
  POSTGRES_PASSWORD: app
  POSTGRES_DB: service_processes
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: service-processes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: service-processes
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
