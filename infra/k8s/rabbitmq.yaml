apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: service-processes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3.13-management
          env:
            # guest с других подов часто запрещён; единый пользователь для кластера
            - name: RABBITMQ_DEFAULT_USER
              value: app
            - name: RABBITMQ_DEFAULT_PASS
              value: app
          ports:
            - containerPort: 5672
            - containerPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: service-processes
spec:
  selector:
    app: rabbitmq
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
